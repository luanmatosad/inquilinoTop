<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InquilinoTop - Novo Chamado</title>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind CSS with specific configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#001a42",
                    "outline": "#727786",
                    "outline-variant": "#c1c6d7",
                    "on-tertiary-fixed": "#1a1c1d",
                    "surface": "#f9f9f9",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#e2e2e3",
                    "tertiary": "#5a5c5d",
                    "on-surface": "#1b1b1b",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#737475",
                    "surface-dim": "#dadada",
                    "primary-fixed-dim": "#aec6ff",
                    "on-tertiary-fixed-variant": "#454748",
                    "primary-fixed": "#d8e2ff",
                    "on-background": "#1b1b1b",
                    "on-secondary-fixed": "#2f1500",
                    "primary-container": "#006fee",
                    "inverse-surface": "#303030",
                    "secondary-container": "#fd8b00",
                    "surface-variant": "#e2e2e2",
                    "surface-tint": "#005ac3",
                    "on-secondary-fixed-variant": "#6e3900",
                    "surface-container": "#eeeeee",
                    "inverse-primary": "#aec6ff",
                    "primary": "#0057be",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#004396",
                    "surface-bright": "#f9f9f9",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#fefbff",
                    "on-surface-variant": "#414754",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#ffb77d",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#ffdcc3",
                    "secondary": "#904d00",
                    "inverse-on-surface": "#f1f1f1",
                    "surface-container-low": "#f3f3f3",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#603100",
                    "surface-container-highest": "#e2e2e2",
                    "on-tertiary-container": "#fcfcfd",
                    "background": "#f9f9f9",
                    "surface-container-high": "#e8e8e8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "xl": "32px",
                    "sm": "8px",
                    "margin-mobile": "16px",
                    "margin-desktop": "32px",
                    "md": "16px",
                    "lg": "24px",
                    "2xl": "48px",
                    "xs": "4px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-md": ["Inter", "sans-serif"],
                    "label-sm": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"],
                    "mono-sm": ["ui-monospace", "monospace"],
                    "h2": ["Inter", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "h1": ["Inter", "sans-serif"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "mono-sm": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background min-h-screen text-on-surface font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container relative overflow-x-hidden">
<!-- Decorative Background Element (HeroUI style) -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-primary-fixed-dim/20 blur-[100px] rounded-full pointer-events-none -z-10"></div>
<!-- Main Canvas (Nav Suppressed due to Transactional Intent) -->
<main class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-xl md:py-2xl flex flex-col gap-lg">
<!-- Contextual Header -->
<header class="flex items-center gap-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high text-on-surface-variant transition-colors group">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-primary-container uppercase tracking-wider">Suporte InquilinoTop</span>
<h1 class="font-h1 text-h1 text-on-surface mt-xs">Novo Chamado</h1>
</div>
</header>
<!-- Form Card Container -->
<form class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_10px_15px_-3px_rgba(0,0,0,0.05)] p-lg md:p-xl flex flex-col gap-lg md:gap-xl relative overflow-hidden">
<!-- Assunto -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="assunto">Assunto</label>
<input class="w-full bg-surface-container-low text-on-surface font-body-md border-transparent rounded-lg px-4 py-3 focus:bg-surface-container-lowest focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all placeholder:text-outline" id="assunto" name="assunto" placeholder="Ex: Vazamento no banheiro" required="" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg md:gap-gutter">
<!-- Categoria -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="categoria">Categoria</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low text-on-surface font-body-md border-transparent rounded-lg px-4 py-3 focus:bg-surface-container-lowest focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all cursor-pointer" id="categoria" name="categoria" required="">
<option disabled="" selected="" value="">Selecione uma categoria...</option>
<option value="manutencao">Manutenção e Reparos</option>
<option value="financeiro">Financeiro / Boletos</option>
<option value="duvida">Dúvidas Gerais</option>
<option value="reclamacao">Reclamações</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Prioridade (HeroUI Card-based Radios) -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Prioridade</label>
<div class="grid grid-cols-3 gap-sm">
<!-- Baixa -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="prioridade" type="radio" value="baixa"/>
<div class="w-full py-3 px-2 flex flex-col items-center justify-center gap-1 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant peer-checked:bg-surface-container-low peer-checked:border-primary-container peer-checked:text-primary-container hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="stat_minus_1">stat_minus_1</span>
<span class="font-label-sm text-label-sm">Baixa</span>
</div>
</label>
<!-- Média -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="prioridade" type="radio" value="media"/>
<div class="w-full py-3 px-2 flex flex-col items-center justify-center gap-1 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant peer-checked:bg-secondary-container/10 peer-checked:border-secondary-container peer-checked:text-secondary-container hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="stat_0">stat_0</span>
<span class="font-label-sm text-label-sm">Média</span>
</div>
</label>
<!-- Alta -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="prioridade" type="radio" value="alta"/>
<div class="w-full py-3 px-2 flex flex-col items-center justify-center gap-1 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant peer-checked:bg-error-container/20 peer-checked:border-error peer-checked:text-error hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="stat_1">stat_1</span>
<span class="font-label-sm text-label-sm">Alta</span>
</div>
</label>
</div>
</div>
</div>
<!-- Descrição -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="descricao">Descrição</label>
<textarea class="w-full bg-surface-container-low text-on-surface font-body-md border-transparent rounded-lg px-4 py-3 focus:bg-surface-container-lowest focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all resize-y placeholder:text-outline" id="descricao" name="descricao" placeholder="Detalhe o problema com o máximo de informações possível..." required="" rows="5"></textarea>
</div>
<!-- Anexar Arquivo (Dropzone) -->
<div class="flex flex-col gap-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Anexar Arquivo</span>
<label class="w-full border-2 border-dashed border-outline-variant rounded-lg p-lg flex flex-col items-center justify-center gap-2 bg-surface-container-low hover:bg-surface-container-highest hover:border-primary-container/50 transition-all cursor-pointer group" for="arquivo">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary-container" data-icon="upload_file">upload_file</span>
</div>
<div class="text-center mt-2">
<p class="font-label-md text-label-md text-on-surface">Clique para enviar ou arraste o arquivo</p>
<p class="font-label-sm text-label-sm text-outline mt-1">SVG, PNG, JPG ou PDF (max. 5MB)</p>
</div>
<input accept=".svg,.png,.jpg,.jpeg,.pdf" class="hidden" id="arquivo" name="arquivo" type="file"/>
</label>
</div>
<!-- Action Button -->
<div class="pt-sm md:pt-md mt-sm border-t border-surface-variant">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2 shadow-[0_4px_14px_0_rgba(0,111,238,0.39)]" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
                    Enviar Chamado
                </button>
</div>
</form>
</main>
</body></html>
