<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro - InquilinoTop</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

        darkMode: "class",
        theme: {

                    "secondary-container": "#fd8b00",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e8e8e8",
                    "inverse-primary": "#aec6ff",
                    "on-primary-fixed-variant": "#004396",
                    "inverse-surface": "#303030",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#fcfcfd",
                    "on-secondary-container": "#603100",
                    "secondary-fixed-dim": "#ffb77d",
                    "surface-variant": "#e2e2e2",
                    "on-secondary-fixed": "#2f1500",
                    "surface-bright": "#f9f9f9",
                    "primary-container": "#006fee",

                    "on-primary-container": "#fefbff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-tertiary-fixed-variant": "#454748",
                    "outline": "#727786",
                    "surface-container-highest": "#e2e2e2",
                    "tertiary-fixed": "#e2e2e3",
                    "on-tertiary-fixed": "#1a1c1d",
                    "on-tertiary": "#ffffff",
                    "surface": "#f9f9f9",
                    "on-secondary-fixed-variant": "#6e3900",
                    "secondary-fixed": "#ffdcc3",
                    "secondary": "#904d00",
                    "tertiary-container": "#737475",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "xl": "32px",
                    "gutter": "16px",
                    "unit": "4px",
                    "sm": "8px",
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "2xl": "48px",
                    "md": "16px",
                    "margin-desktop": "32px"
            },
            "fontFamily": {
                    "body-lg": [
                            "Inter"
                    ],
                    "mono-sm": [

<body class="bg-background min-h-screen flex items-center justify-center p-gutter font-body-md text-body-md text-on-background antialiased selection:bg-primary-container/20 selection:text-primary-container">
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.05)] border border-surface-variant p-lg md:p-xl transition-all duration-300">
<!-- Header -->
<div class="text-center mb-lg">
<h1 class="font-h2 text-h2 text-primary-container mb-xs tracking-tight">InquilinoTop</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Crie sua conta para começar</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Nome Completo -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-unit" for="fullName">Nome Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full bg-surface border border-surface-variant rounded-lg pl-10 pr-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="fullName" name="fullName" placeholder="João da Silva" required="" type="text"/>
</div>
</div>
<!-- E-mail -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-unit" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface border border-surface-variant rounded-lg pl-10 pr-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="email" name="email" placeholder="seu@email.com.br" required="" type="email"/>
</div>
</div>
<!-- Senha -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-unit" for="password">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface border border-surface-variant rounded-lg pl-10 pr-10 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Confirmar Senha -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-unit" for="confirmPassword">Confirmar Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
<input class="w-full bg-surface border border-surface-variant rounded-lg pl-10 pr-10 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full h-[44px] bg-primary-container text-on-primary-container rounded-lg font-label-md text-label-md flex items-center justify-center hover:bg-primary-fixed-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-surface-container-lowest active:scale-[0.98]" type="submit">
                Cadastrar
            </button>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Já tem uma conta? 
                <a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors underline-offset-4 hover:underline focus:outline-none focus:underline rounded-sm" href="#">Entrar</a>
</p>
</div>
</main>
</body></html>
