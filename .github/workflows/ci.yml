name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inquilinotop
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Generate JWT keys
        run: |
          mkdir -p backend/keys
          openssl genrsa -out backend/keys/private.pem 2048
          openssl rsa -in backend/keys/private.pem -pubout -out backend/keys/public.pem

      - name: Run backend unit tests
        working-directory: backend
        run: go test $(go list ./pkg/... ./internal/... | grep -v 'github.com/inquilinotop/api/internal/identity') -run "TestService|TestHandler|TestSign|TestVerify|TestMiddleware|TestOK|TestErr" -v
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/inquilinotop?sslmode=disable

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inquilinotop
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inquilinotop_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Generate JWT keys
        run: |
          mkdir -p backend/keys
          openssl genrsa -out backend/keys/private.pem 2048
          openssl rsa -in backend/keys/private.pem -pubout -out backend/keys/public.pem

      - name: Run backend integration tests
        working-directory: backend
        run: go test -p 1 ./... -v
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/inquilinotop?sslmode=disable
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/inquilinotop_test?sslmode=disable

  backend-security:
    name: Backend Security & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run GoSec
        uses: securego/gosec@master
        with:
          args: -no-fail ./backend/...

      # golangci-lint v2 has compatibility issues with the action
      # Skipping for now, will re-enable after resolving issues
      # - name: Run golangci-lint

  frontend-quality:
    name: Frontend Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration, frontend-quality]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    steps:
      - name: Trigger staging deploy
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -s -f -X POST "${{ secrets.DOKPLOY_WEBHOOK_STAGING }}" \
            -H "Content-Type: application/json" || echo "Webhook staging falhou"

      - name: Trigger production deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -f -X POST "${{ secrets.DOKPLOY_WEBHOOK_PROD }}" \
            -H "Content-Type: application/json" || echo "Webhook prod falhou"
