version: '3.8'

# Dokploy configuration for InquilinoTop
# This file defines the entire production infrastructure
# Deploy via: dokploy deploy --file dokploy.yaml

services:
  postgres:
    image: postgres:16-alpine
    container_name: inquilinotop_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inquilinotop}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inquilinotop

  postgres_test:
    image: postgres:16-alpine
    container_name: inquilinotop_postgres_test
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inquilinotop_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inquilinotop
    profiles:
      - test

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_TIME=${BUILD_TIME}
        - VERSION=${VERSION}
    container_name: inquilinotop_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL}
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      APP_ENV: ${APP_ENV:-production}
      PORT: ${BACKEND_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@inquilinotop.com}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/app/storage/documents}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
      - backend_storage:/app/storage/documents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - inquilinotop

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILD_TIME=${BUILD_TIME}
        - VERSION=${VERSION}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: inquilinotop_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3005}:3005"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NODE_ENV: production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - inquilinotop

volumes:
  postgres_data:
    driver: local
  backend_storage:
    driver: local

networks:
  inquilinotop:
    driver: bridge
