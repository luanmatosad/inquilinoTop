run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - gosec
    - gofmt
    - ineffassign
    - unused
    - misspell

output:
  formats:
    - format: colored-line-number

issues:
  exclude-rules:
    # Allow unused variables in test files
    - path: _test\.go
      linters:
        - unused
    # Allow shadowing in test setup
    - path: _test\.go
      text: "shadow:"
      linters:
        - govet
