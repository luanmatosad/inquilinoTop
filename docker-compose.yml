services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inquilinotop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inquilinotop_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  glitchtip:
    image: glitchtip/glitchtip
    ports:
      - "${GLITCHTIP_PORT:-3001}:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-inquilinotop}?sslmode=disable
      GLITCHTIP_SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      GLITCHTIP_REDIS_URL: redis://redis:6379
      GLITCHTIP_UPTIME_ALLOW_PRIVATE_IPS: "true"
      ENABLE_OBSERVABILITY_API: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  glitchtip-worker:
    image: glitchtip/glitchtip
    command: ./manage.py runworker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-inquilinotop}?sslmode=disable
      GLITCHTIP_SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      GLITCHTIP_REDIS_URL: redis://redis:6379
      GLITCHTIP_UPTIME_ALLOW_PRIVATE_IPS: "true"
      ENABLE_OBSERVABILITY_API: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - go_cache:/root/.cache/go-build
      - go_modules:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-inquilinotop}?sslmode=disable
      TEST_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres_test:5432/inquilinotop_test?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      PORT: 8080
      SENTRY_DSN: ${BACKEND_SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      postgres_test:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3005}:3005"
    # No volume mount for frontend - use built image only
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.0.0}
    depends_on:
      - backend
      - glitchtip

volumes:
  postgres_data:
  go_cache:
  go_modules:
  frontend_node_modules:
